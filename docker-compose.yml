# Stack de produção: PostgreSQL + API + Nginx (UI com proxy /api e /ws).
# Projeto Compose: lottocore (name abaixo) — aparece assim no painel Hostinger / Docker Manager.
# Traefik continua no stack root (/root/docker-compose.yml); este stack só liga à rede root_default.
#
# Na VPS: cp env.production.template .env; rede do Traefik:
#   docker network create root_default 2>/dev/null || true
# Depois, na pasta do repo: docker compose up -d --build
#
# DNS: apontar APP_HOST (ex. lottocore.atus.tech) para o IP da VPS.
# Acesso direto por porta (sem Traefik): ver docker-compose.publish.yml

name: lottocore

networks:
  default:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-root_default}

services:
  postgres:
    image: postgres:16-alpine
    container_name: lottocore-postgres-prod
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-bingo}
    volumes:
      - lottocore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bingo} -d ${POSTGRES_DB:-bingo}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lottocore-backend-prod
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: '3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - lottocore_uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lottocore-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - traefik
    # Rota HTTPS: ficheiro no Traefik (file provider), igual ao Nexus — ver deploy/traefik/lottocore-http.yaml

volumes:
  # Nomes fixos na VPS. Primeira vez: docker volume create lottocore_pgdata && docker volume create lottocore_uploads
  lottocore_pgdata:
    external: true
    name: lottocore_pgdata
  lottocore_uploads:
    external: true
    name: lottocore_uploads
