# Stack de produção: PostgreSQL + API + contentor frontend (Nginx interno: estático + proxy /api e /ws).
# Roteador de borda: só Traefik (80/443 no stack root). Este projeto não publica portas no host.
# O contentor frontend liga à rede root_default para o Traefik encaminhar para a porta 80 interna.
#
# Na VPS: cp env.production.template .env; docker network create root_default 2>/dev/null || true
# Depois: docker compose up -d --build
#
# DNS: A/AAAA para APP_HOST → IP da VPS. Rota TLS: deploy/traefik/lottocore-http.yaml (file provider).

name: lottocore

networks:
  default:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-root_default}

services:
  postgres:
    image: postgres:16-alpine
    container_name: lottocore-postgres-prod
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-bingo}
    volumes:
      - lottocore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bingo} -d ${POSTGRES_DB:-bingo}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lottocore-backend-prod
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: '3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - lottocore_uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lottocore-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - traefik

volumes:
  # Nomes fixos na VPS. Primeira vez: docker volume create lottocore_pgdata && docker volume create lottocore_uploads
  lottocore_pgdata:
    external: true
    name: lottocore_pgdata
  lottocore_uploads:
    external: true
    name: lottocore_uploads
