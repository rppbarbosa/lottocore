# Stack de produção: PostgreSQL + API + frontend (Nginx interno: estático + proxy /api e /ws).
# Portas no host (painel Hostinger / outros projetos): PUBLISH_* no .env — predefinições evitam 3010/5180/5434.
# Traefik (stack root) continua a rotear https://APP_HOST → frontend:80 na rede root_default.
#
# Na VPS: cp env.production.template .env; docker network create root_default 2>/dev/null || true
# Depois: docker compose up -d --build
#
# DNS: A/AAAA para APP_HOST → IP da VPS. TLS: deploy/traefik/lottocore-http.yaml

name: lottocore

networks:
  default:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-root_default}

services:
  postgres:
    image: postgres:16-alpine
    container_name: lottocore-postgres-prod
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-bingo}
    volumes:
      - lottocore_pgdata:/var/lib/postgresql/data
    ports:
      - '${PUBLISH_POSTGRES_PORT:-5440}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bingo} -d ${POSTGRES_DB:-bingo}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lottocore-backend-prod
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: '3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - lottocore_uploads:/app/backend/uploads
    ports:
      - '${PUBLISH_BACKEND_PORT:-3020}:3000'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lottocore-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - traefik
    ports:
      - '${PUBLISH_FRONTEND_PORT:-8092}:80'

volumes:
  # Nomes fixos na VPS. Primeira vez: docker volume create lottocore_pgdata && docker volume create lottocore_uploads
  lottocore_pgdata:
    external: true
    name: lottocore_pgdata
  lottocore_uploads:
    external: true
    name: lottocore_uploads
